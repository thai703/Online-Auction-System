spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

auction.jwt.secret=TestSecretKeyForJwtTokenGenerationThatIsLongEnoughToBeSecure2024!@#$%
auction.jwt.expiration=3600000

auction.images.upload.path=${java.io.tmpdir}/test-auction-images
auction.server.url=http://localhost:8080
auction.registration.verification.enabled=false
auction.admin.bootstrap.enabled=false
auction.websocket.allowed-origins=*

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

spring.main.allow-circular-references=true
spring.flyway.enabled=false
