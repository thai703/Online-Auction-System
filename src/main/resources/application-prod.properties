# Production profile overrides
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
spring.h2.console.enabled=false

# Upload path for Docker volume
auction.images.upload.path=/data/auction-images

# Disable bootstrap admin in production
auction.admin.bootstrap.enabled=false

# Forward headers from reverse proxy
server.forward-headers-strategy=framework
