# Server Configuration
server.port=${SERVER_PORT:8123}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/auctions?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# H2 Console Configuration (dev only, disabled by default)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Thymeleaf Configuration
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# Allow Circular References
spring.main.allow-circular-references=true

# Image upload configuration
auction.images.upload.path=${UPLOAD_PATH:./uploads/auction-images}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Static resources configuration
spring.web.resources.add-mappings=true

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# JWT Configuration
auction.jwt.secret=${JWT_SECRET:ChangeThisToASecureRandomSecretKeyInProduction2024!@#}
auction.jwt.expiration=${JWT_EXPIRATION:86400000}

# Registration & Verification
auction.registration.verification.enabled=${VERIFICATION_ENABLED:true}
auction.server.url=${SERVER_URL:http://localhost:8123}

# Google OAuth2 Login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Admin bootstrap (disable after first seed)
auction.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
auction.admin.bootstrap.email=${ADMIN_EMAIL:admin@auctions.local}
auction.admin.bootstrap.password=${ADMIN_PASSWORD:}
auction.admin.bootstrap.full-name=${ADMIN_FULLNAME:System Administrator}
auction.admin.bootstrap.phone=${ADMIN_PHONE:0000000000}

# WebSocket
auction.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:8123}

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:30}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
