<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<head>
    <title>Forgot Password - Auctions</title>
</head>

<body>
    <main>
        <style>
            .auth-wrapper {
                min-height: calc(100vh - 250px);
                background: linear-gradient(135deg, #0d6efd20 0%, #0d6efd05 100%);
                border-radius: 0 0 50px 50px;
            }

            .auth-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 20px;
                overflow: hidden;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }

            .auth-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            }

            .auth-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
                padding: 2rem;
                text-align: center;
                color: white;
            }

            .auth-header .icon {
                font-size: 3rem;
                margin-bottom: 0.5rem;
            }

            .auth-header h3 {
                font-size: 1.8rem;
                margin: 0;
            }

            .auth-body {
                padding: 2.5rem;
            }

            .password-strength {
                height: 4px;
                border-radius: 4px;
                margin-top: 8px;
                transition: all 0.3s ease;
            }

            .form-control {
                border-radius: 10px;
                border: 2px solid #e0e0e0;
                padding: 0.75rem 1rem;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                border-color: #0d6efd;
                box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            }

            .btn-submit {
                border-radius: 10px;
                padding: 0.75rem;
                font-weight: 600;
                background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
                border: none;
                transition: all 0.3s ease;
            }

            .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
            }

            @media (max-width: 576px) {
                .auth-wrapper {
                    padding: 2rem 0;
                    border-radius: 0 0 30px 30px;
                }
                .auth-header {
                    padding: 1.5rem;
                }
                .auth-header h3 {
                    font-size: 1.5rem;
                }
                .auth-body {
                    padding: 1.5rem;
                }
            }
        </style>

        <div class="auth-wrapper py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-5">
                        <div class="auth-card">
                            <div class="auth-header">
                                <h3>Forgot Password?</h3>
                            </div>
                            <div class="auth-body">
                                <p class="text-muted text-center mb-4">Enter the email address associated with your
                                    account. We'll send you a link to reset your password.</p>

                                <div th:if="${forgotSuccess}"
                                    class="alert alert-success mb-4 rounded-3 d-flex align-items-center gap-2">
                                    <i class="bi bi-check-circle-fill"></i>
                                    <span th:text="${forgotSuccess}"></span>
                                </div>
                                <div th:if="${forgotError}"
                                    class="alert alert-danger mb-4 rounded-3 d-flex align-items-center gap-2">
                                    <i class="bi bi-exclamation-triangle-fill"></i>
                                    <span th:text="${forgotError}"></span>
                                </div>

                                <form th:action="@{/forgot-password}" method="post" th:if="${forgotSuccess == null}">
                                    <div class="mb-4">
                                        <label for="email" class="form-label fw-semibold">Email Address</label>
                                        <input type="email" class="form-control form-control-lg" id="email" name="email"
                                            placeholder="you@example.com" required autofocus>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary btn-submit btn-lg">
                                            </i>Send Reset Link
                                        </button>
                                    </div>
                                </form>

                                <div class="text-center mt-4 pt-3 border-top">
                                    <a href="/login" class="text-muted small text-decoration-none"><i
                                            class="bi bi-arrow-left me-1"></i>Back to Login</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
