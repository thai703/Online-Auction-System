<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<head>
    <title>My Bids - Auctions</title>
</head>

<body>
    <main>
        <style>
            .bids-header {
                background: linear-gradient(135deg, #0d6efd20 0%, #0d6efd05 100%);
                border-radius: 20px;
                padding: 2rem;
                margin-bottom: 2rem;
                position: relative;
                overflow: hidden;
            }

            .bids-header::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: url('data:image/svg+xml,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><rect width="1" height="1" fill="%230d6efd10"/></svg>') repeat;
                opacity: 0.5;
                pointer-events: none;
                z-index: 0;
            }

            .bid-card {
                background: white;
                border-radius: 15px;
                border: 1px solid rgba(0, 0, 0, 0.1);
                overflow: hidden;
                transition: all 0.3s ease;
                margin-bottom: 1.5rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            .bid-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                border-color: #0d6efd;
            }

            .bid-header {
                padding: 1.25rem;
                background: linear-gradient(to right, #f8f9fa, white);
                border-bottom: 1px solid #e9ecef;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bid-body {
                padding: 1.5rem;
            }

            .bid-amount {
                font-size: 1.75rem;
                font-weight: 700;
                background: linear-gradient(45deg, #0d6efd, #00c6ff);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 0.5rem;
            }

            .bid-info {
                color: #6c757d;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .bid-status {
                display: inline-flex;
                align-items: center;
                padding: 0.5rem 1rem;
                border-radius: 20px;
                font-weight: 600;
                font-size: 0.875rem;
                transition: all 0.3s ease;
            }

            .status-highest {
                background: linear-gradient(135deg, #d1e7dd, #a3cfbb);
                color: #0f5132;
            }

            .status-outbid {
                background: linear-gradient(135deg, #f8d7da, #f5c2c7);
                color: #842029;
            }

            .status-pending {
                background: linear-gradient(135deg, #fff3cd, #ffe69c);
                color: #664d03;
            }

            .status-won {
                background: linear-gradient(135deg, #dbeafe, #bfdbfe);
                color: #1d4ed8;
            }

            .status-cancelled {
                background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
                color: #475569;
            }

            .empty-state {
                text-align: center;
                padding: 4rem 2rem;
                background: white;
                border-radius: 20px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
                border: 2px dashed #e9ecef;
            }

            .empty-state i {
                font-size: 4rem;
                background: linear-gradient(45deg, #0d6efd, #00c6ff);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 1.5rem;
            }

            .empty-state h3 {
                color: #343a40;
                margin-bottom: 1rem;
            }

            .empty-state p {
                color: #6c757d;
                margin-bottom: 2rem;
            }

            .empty-state .btn {
                padding: 0.75rem 2rem;
                font-weight: 600;
                border-radius: 15px;
                transition: all 0.3s ease;
            }

            /* Custom Pagination Styles */
            .custom-pagination {
                margin-top: 2rem;
                padding: 1rem;
                background: white;
                border-radius: 15px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            .custom-pagination .pagination {
                margin-bottom: 0;
                gap: 0.5rem;
            }

            .custom-pagination .page-item {
                margin: 0 2px;
            }

            .custom-pagination .page-link {
                border: none;
                padding: 0.75rem 1rem;
                border-radius: 10px;
                color: #6c757d;
                font-weight: 500;
                transition: all 0.3s ease;
            }

            .custom-pagination .page-link:hover {
                background: #e9ecef;
                color: #0d6efd;
                transform: translateY(-2px);
            }

            .custom-pagination .page-item.active .page-link {
                background: linear-gradient(135deg, #0d6efd, #00c6ff);
                color: white;
                box-shadow: 0 4px 8px rgba(13, 110, 253, 0.2);
            }

            .custom-pagination .page-item.disabled .page-link {
                background: #f8f9fa;
                color: #adb5bd;
                cursor: not-allowed;
            }
        </style>

        <div class="bids-header">
            <div class="container">
                <h1 class="mb-4">My Bids</h1>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(groupedBids)}" class="empty-state">
                    <i class="bi bi-cash-coin"></i>
                    <h3>No Bids Yet</h3>
                    <p class="text-muted">You haven't placed any bids yet. Start bidding to see your history here!</p>
                    <a href="/auctions/browse" class="btn btn-primary">
                        Browse Auctions
                    </a>
                </div>

                <!-- Grouped Bid List -->
                <div th:if="${not #lists.isEmpty(groupedBids)}" class="row">
                    <div class="col-12">
                        <div th:each="group : ${groupedBids}" class="bid-card">
                            <div class="bid-header">
                                <h5 class="mb-0" th:text="${group.auction.productName}">Product Name</h5>
                                <span th:class="'bid-status ' + 
                                         ${(group.auction.status.name() == 'ACTIVE') ? 
                                            (group.highestBid == group.auction.currentPrice ? 'status-highest' : 'status-outbid') :
                                            (group.auction.status.name() == 'ENDED' ?
                                                (group.auction.winner != null and group.auction.winner.id == #authentication.principal.id ? 'status-won' : 'status-pending') :
                                                'status-cancelled')}" 
                                      th:text="${(group.auction.status.name() == 'ACTIVE') ? 
                                            (group.highestBid == group.auction.currentPrice ? 'Leading Bid' : 'Outbid') :
                                            (group.auction.status.name() == 'ENDED' ?
                                                (group.auction.winner != null and group.auction.winner.id == #authentication.principal.id ? 'Won Auction' : 'Auction Ended') :
                                                'Auction Cancelled')}">
                                    Status
                                </span>
                            </div>
                            <div class="bid-body">
                                <div class="row align-items-center">
                                    <div class="col-md-3">
                                        <div class="text-muted mb-2">Your Highest Bid</div>
                                        <div class="bid-amount"
                                            th:text="${#numbers.formatInteger(group.highestBid, 0, 'POINT') + ' VNĐ'}">20.000 VNĐ
                                        </div>
                                        <div class="bid-info">
                                            <i class="bi bi-clock"></i>
                                            <span th:text="${#temporals.format(group.latestBidTime, 'dd MMM yyyy HH:mm')}">Time</span>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="text-muted mb-2">Current Auction Price</div>
                                        <div class="h5 mb-0"
                                            th:text="${#numbers.formatInteger(group.auction.currentPrice, 0, 'POINT') + ' VNĐ'}">
                                            150 VNĐ</div>
                                        <div th:if="${group.auction.status.name() == 'ENDED'}" class="badge bg-secondary mt-1">Final Price</div>
                                    </div>
                                    <div class="col-md-3 text-center">
                                        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" 
                                                type="button" 
                                                data-bs-toggle="collapse" 
                                                th:attr="data-bs-target='#history-'+${group.auction.id}">
                                            <i class="bi bi-clock-history me-1"></i>
                                            <span th:text="${group.bidCount + ' bids total'}">4 bids total</span>
                                        </button>
                                    </div>
                                    <div class="col-md-3 text-md-end">
                                        <a th:href="@{'/auctions/' + ${group.auction.id}}"
                                            class="btn btn-primary rounded-pill px-4">
                                            <i class="bi bi-eye me-2"></i>View Details
                                        </a>
                                    </div>
                                </div>

                                <!-- Bid History Collapse -->
                                <div class="collapse mt-3" th:id="'history-'+${group.auction.id}">
                                    <div class="card card-body p-3 bg-light border-0 rounded-4">
                                        <h6 class="small fw-bold mb-3 text-primary">
                                            <i class="bi bi-list-ul me-2"></i>Your Bidding History:
                                        </h6>
                                        <div class="list-group list-group-flush bg-transparent">
                                            <div th:each="bid : ${group.allUserBids}" class="list-group-item bg-transparent border-0 d-flex justify-content-between align-items-center py-2 px-0">
                                                <div>
                                                    <span class="fw-bold" th:text="${#numbers.formatInteger(bid.amount, 0, 'POINT') + ' VNĐ'}">5.000 VNĐ</span>
                                                    <span th:if="${bid.amount == group.highestBid}" class="badge bg-primary ms-2 small">Your Max</span>
                                                </div>
                                                <span class="text-muted small" th:text="${#temporals.format(bid.bidTime, 'HH:mm dd/MM/yy')}">Time</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${totalPages > 1}" class="custom-pagination">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/bids/my-bids(page=${currentPage - 1})}"
                                aria-label="Previous">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item" th:each="pageNum : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${pageNum == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/bids/my-bids(page=${pageNum})}" th:text="${pageNum}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/bids/my-bids(page=${currentPage + 1})}" aria-label="Next">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
</body>

</html>
