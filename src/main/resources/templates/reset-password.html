<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<head>
    <title>Reset Password - Auctions</title>
</head>

<body>
    <main>
        <style>
            .auth-wrapper {
                min-height: calc(100vh - 250px);
                background: linear-gradient(135deg, #0d6efd20 0%, #0d6efd05 100%);
                border-radius: 0 0 50px 50px;
            }

            .auth-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 20px;
                overflow: hidden;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }

            .auth-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            }

            .auth-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
                padding: 2rem;
                text-align: center;
                color: white;
            }

            .auth-header .icon {
                font-size: 3rem;
                margin-bottom: 0.5rem;
            }

            .auth-header h3 {
                font-size: 1.8rem;
                margin: 0;
            }

            .auth-body {
                padding: 2.5rem;
            }

            .form-control {
                border-radius: 10px;
                border: 2px solid #e0e0e0;
                padding: 0.75rem 1rem;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                border-color: #0d6efd;
                box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            }

            .btn-submit {
                border-radius: 10px;
                padding: 0.75rem;
                font-weight: 600;
                background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
                border: none;
                transition: all 0.3s ease;
            }

            .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
            }

            .password-strength {
                height: 4px;
                border-radius: 4px;
                margin-top: 8px;
                transition: all 0.3s ease;
            }

            @media (max-width: 576px) {
                .auth-wrapper {
                    padding: 2rem 0;
                    border-radius: 0 0 30px 30px;
                }
                .auth-header {
                    padding: 1.5rem;
                }
                .auth-header h3 {
                    font-size: 1.5rem;
                }
                .auth-body {
                    padding: 1.5rem;
                }
            }
        </style>

        <div class="auth-wrapper py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-5">
                        <div class="auth-card">
                            <div class="auth-header">
                                <h3>Set New Password</h3>
                            </div>
                            <div class="auth-body">

                                <!-- Invalid/expired token -->
                                <div th:if="${resetError}" class="alert alert-danger text-center rounded-3 d-block">
                                    <i class="bi bi-x-circle-fill me-2"></i>
                                    <span th:text="${resetError}"></span>
                                    <div class="mt-2"><a href="/forgot-password" class="alert-link">Request a new
                                            link</a></div>
                                </div>

                                <!-- Valid token: show form -->
                                <div th:if="${token != null and resetError == null}">
                                    <p class="text-muted text-center mb-4">Choose a strong new password for your
                                        account.</p>

                                    <form th:action="@{/reset-password}" method="post" id="resetForm">
                                        <input type="hidden" name="token" th:value="${token}">

                                        <div class="mb-3">
                                            <label for="password" class="form-label fw-semibold">New Password</label>
                                            <input type="password" class="form-control form-control-lg" id="password"
                                                name="password" placeholder="At least 8 characters" minlength="8"
                                                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}"
                                                title="At least 8 characters, including uppercase, lowercase, number, and special character"
                                                required>
                                            <div class="password-strength bg-secondary" id="strengthBar"></div>
                                            <div id="strengthText" class="form-text"></div>
                                            <div class="form-text">Use at least 8 characters with uppercase, lowercase, number, and special character.</div>
                                        </div>

                                        <div class="mb-4">
                                            <label for="confirmPassword" class="form-label fw-semibold">Confirm
                                                Password</label>
                                            <input type="password" class="form-control form-control-lg"
                                                id="confirmPassword" placeholder="Repeat your password" required>
                                            <div id="matchText" class="form-text"></div>
                                        </div>

                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-primary btn-submit btn-lg"
                                                id="submitBtn">
                                                <i class="bi bi-check-lg me-2"></i>Change Password
                                            </button>
                                        </div>
                                    </form>
                                </div>

                                <div class="text-center mt-4 pt-3 border-top">
                                    <a href="/login" class="text-muted small text-decoration-none"><i
                                            class="bi bi-arrow-left me-1"></i>Back to Login</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            const matchText = document.getElementById('matchText');
            const submitBtn = document.getElementById('submitBtn');

            if (passwordInput) {
                passwordInput.addEventListener('input', () => {
                    const val = passwordInput.value;
                    let strength = 0;
                    if (val.length >= 8) strength++;
                    if (/[a-z]/.test(val)) strength++;
                    if (/[A-Z]/.test(val)) strength++;
                    if (/[0-9]/.test(val)) strength++;
                    if (/[^A-Za-z0-9]/.test(val)) strength++;
                    const colors = ['#dc3545', '#fd7e14', '#ffc107', '#20c997', '#198754'];
                    const labels = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
                    strengthBar.style.width = (strength * 20) + '%';
                    strengthBar.style.backgroundColor = colors[strength - 1] || '#dee2e6';
                    strengthText.textContent = strength > 0 ? labels[strength - 1] : '';
                    checkMatch();
                });

                confirmInput.addEventListener('input', checkMatch);

                document.getElementById('resetForm').addEventListener('submit', (e) => {
                    if (passwordInput.value !== confirmInput.value) {
                        e.preventDefault();
                        matchText.textContent = 'Passwords do not match.';
                        matchText.style.color = '#dc3545';
                    }
                });
            }

            function checkMatch() {
                if (confirmInput.value.length === 0) { matchText.textContent = ''; return; }
                if (passwordInput.value === confirmInput.value) {
                    matchText.textContent = '✓ Passwords match';
                    matchText.style.color = '#198754';
                } else {
                    matchText.textContent = '✗ Passwords do not match';
                    matchText.style.color = '#dc3545';
                }
            }
        </script>
    </main>
</body>

</html>
