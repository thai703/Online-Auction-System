<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<head>
    <title>Payment Result - Auctions</title>
</head>

<body>
    <main>
        <style>
            .result-wrapper {
                min-height: 70vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }

            .result-card {
                background: white;
                border-radius: 30px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
                padding: 4rem 2rem;
                max-width: 550px;
                width: 100%;
                text-align: center;
                position: relative;
                overflow: hidden;
                border: 1px solid rgba(0, 0, 0, 0.05);
            }

            .result-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 6px;
                background: linear-gradient(to right, #0d6efd, #00c6ff);
            }

            .result-card.error::before {
                background: linear-gradient(to right, #dc3545, #ff4d5a);
            }

            .icon-wrapper {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 3.5rem;
                margin: 0 auto 2rem;
                position: relative;
                animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .success-icon {
                background: rgba(25, 135, 84, 0.1);
                color: #198754;
            }

            .error-icon {
                background: rgba(220, 53, 69, 0.1);
                color: #dc3545;
            }

            @keyframes scaleIn {
                from { transform: scale(0); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .result-title {
                font-size: 2rem;
                font-weight: 800;
                margin-bottom: 1rem;
                background: linear-gradient(45deg, #333, #666);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .success .result-title {
                background: linear-gradient(45deg, #198754, #20c997);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .error .result-title {
                background: linear-gradient(45deg, #dc3545, #ff4d5a);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .result-message {
                color: #64748b;
                font-size: 1.15rem;
                line-height: 1.6;
                margin-bottom: 2.5rem;
            }

            .action-buttons {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
            }

            .btn-action {
                padding: 1rem 2rem;
                border-radius: 15px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                font-size: 0.9rem;
            }

            .btn-primary-gradient {
                background: linear-gradient(135deg, #0d6efd 0%, #00c6ff 100%);
                border: none;
                color: white;
                box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
            }

            .btn-primary-gradient:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 30px rgba(13, 110, 253, 0.3);
                color: white;
            }

            .btn-outline-custom {
                border: 2px solid #e2e8f0;
                color: #475569;
                background: white;
            }

            .btn-outline-custom:hover {
                background: #f8fafc;
                border-color: #cbd5e1;
                color: #1e293b;
                transform: translateY(-3px);
            }

            /* Animations */
            .fade-up {
                animation: fadeInUp 0.8s ease backwards;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>

        <div class="result-wrapper">
            <!-- Success Card -->
            <div th:if="${status == 'success'}" class="result-card success fade-up">
                <div class="icon-wrapper success-icon">
                    <i class="bi bi-check2-circle"></i>
                </div>
                <h2 class="result-title">Payment Received!</h2>
                <p class="result-message" th:text="${message}">Your transaction has been processed successfully.</p>
                
                <div class="action-buttons">
                    <a href="/transactions/history" class="btn btn-action btn-primary-gradient">
                        <i class="bi bi-clock-history"></i> Payment History
                    </a>
                    <a href="/auctions/browse" class="btn btn-action btn-outline-custom">
                        <i class="bi bi-arrow-left"></i> Keep Browsing
                    </a>
                </div>
            </div>

            <!-- Error Card -->
            <div th:if="${status == 'error'}" class="result-card error fade-up">
                <div class="icon-wrapper error-icon">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
                <h2 class="result-title">Payment Unsuccessful</h2>
                <p class="result-message" th:text="${message}">We encountered an issue processing your request.</p>
                
                <div class="action-buttons">
                    <a href="/wallet" class="btn btn-action btn-primary-gradient">
                        <i class="bi bi-plus-circle"></i> Top Up Wallet
                    </a>
                    <a href="/transactions/history" class="btn btn-action btn-outline-custom">
                        <i class="bi bi-clock-history"></i> Check Status
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
